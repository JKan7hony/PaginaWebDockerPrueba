<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster Hunter Wilds | Exploración Extrema</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* Reset de estilos */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0e11;
            color: #e0d7c6;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            width: 100%;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7)), 
                        url('https://images.alphacoders.com/134/1346511.jpeg'); /* Imagen de fondo sugerida */
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 4px solid #c49a4d;
        }

        /* Navegación */
        nav {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            color: #f5f5f5;
            letter-spacing: 2px;
            font-weight: bold;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            margin-left: 30px;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #c49a4d;
        }

        /* Contenido Central */
        .hero-content h1 {
            font-family: 'Cinzel', serif;
            font-size: 4rem;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            margin-bottom: 10px;
            color: #fff;
        }

        .hero-content p {
            font-size: 1.2rem;
            max-width: 600px;
            margin-bottom: 30px;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
            font-weight: 300;
        }

        /* Botones estilo Monster Hunter */
        .btn-container {
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 15px 35px;
            text-transform: uppercase;
            text-decoration: none;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }

        .btn-primary {
            background-color: #c49a4d;
            color: #1a1a1a;
        }

        .btn-primary:hover {
            background-color: #e6b86a;
            transform: scale(1.05);
        }

        .btn-secondary {
            background-color: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(5px);
        }

        .btn-secondary:hover {
            background-color: rgba(255,255,255,0.2);
        }

        /* Decoración de bordes */
        .frame-top {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 1px solid rgba(196, 154, 77, 0.3);
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .hero-content h1 { font-size: 2.5rem; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <div class="frame-top"></div>

    <nav>
        <div class="logo">MONSTER HUNTER <span style="color: #c49a4d;">WILDS</span></div>
        <div class="nav-links">
            <a href="#">Inicio</a>
            <a href="#">Ecosistemas</a>
            <a href="#">Monstruos</a>
            <a href="#">Guía de Caza</a>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>DOMINA LA NATURALEZA</h1>
            <p>Explora un mundo vivo y cambiante. Caza en manada o sobrevive en solitario en la frontera más salvaje jamás vista.</p>
            <div class="btn-container">
                <a href="https://store.steampowered.com/app/2246340/Monster_Hunter_Wilds/" class="btn btn-primary">Reservar Ahora</a>
                <a href="#" class="btn btn-secondary">Ver Trailer</a>
            </div>
        </div>
    </header>

</body>
</html>
